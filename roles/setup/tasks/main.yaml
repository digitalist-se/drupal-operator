- name: automatic db backup
  when:
    - auto_backup is defined
  k8s:
    definition:
      apiVersion: batch/v1beta1
      kind: CronJob
      metadata:
        name: '{{ meta.name }}-auto-db-backup'
        namespace: '{{ meta.namespace }}'
      spec:
        schedule: '{{ backup_cron_schedule }}'
        jobTemplate:
          spec:
            template:
              spec:
                containers:
                - name: auto-db-backup
                  image: ozziio/mysql-backup-s3
                  imagePullPolicy: IfNotPresent
                  env:
                    - name: S3_ACCESS_KEY_ID
                      valueFrom:
                        secretKeyRef:
                          name: 'auto-db-backup-secret'
                          key: aws_access_key
                    - name: S3_SECRET_ACCESS_KEY
                      valueFrom:
                        secretKeyRef:
                          name: 'auto-db-backup-secret'
                          key: aws_secret_access_key
                    - name: S3_REGION
                      valueFrom:
                        secretKeyRef:
                          name: 'auto-db-backup-secret'
                          key: region
                          optional: true
                    - name: S3_BUCKET
                      valueFrom:
                        secretKeyRef:
                          name: 'auto-db-backup-secret'
                          key: bucket                       
                    - name: S3_ENDPOINT
                      optional: 1
                      valueFrom:
                        secretKeyRef:
                          name: 'auto-db-backup-secret'
                          key: endpoint
                          optional: true
                    - name: DEBUG
                      valueFrom:
                        secretKeyRef:
                          name: 'auto-db-backup-secret'
                          key: debug
                          optional: true      
                    - name: S3_PREFIX
                      value: '{{ meta.name }}'
                    - name: MYSQL_HOST
                      value: '{{ meta.name }}-db'
                    - name: MYSQL_PORT
                      value: "3306"
                    - name: MYSQLDUMP_DATABASE
                      valueFrom:
                        secretKeyRef:
                          name: '{{ meta.name }}.drupal-secrets'
                          key: db_database
                    - name: MYSQL_USER
                      valueFrom:
                        secretKeyRef:
                          name: '{{ meta.name }}.drupal-secrets'
                          key: db_user
                    - name: MYSQL_PASSWORD
                      valueFrom:
                        secretKeyRef:
                          name: '{{ meta.name }}.drupal-secrets'
                          key: db_password
                restartPolicy: Never

- name: Drupal Ingress
  when: 
    - drupal_loadbalancer
  k8s:
    definition:
      apiVersion: extensions/v1beta1
      kind: Ingress
      metadata:
        name: '{{ meta.name }}'
        namespace: '{{ meta.namespace }}'
        annotations:
          nginx.org/proxy-connect-timeout: "30s"
          nginx.org/proxy-read-timeout: "20s"
          nginx.org/client-max-body-size: "20m"
          nnginx.org/proxy-hide-headers: "X-Powered-By, X-Generator"
      spec:
        rules:
          - host: '{{ drupal_hostname }}'
        backend:
          serviceName: '{{ meta.name }}-lb'
          servicePort: 80