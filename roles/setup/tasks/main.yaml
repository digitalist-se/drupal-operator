---
  - name: Drupal Settings
    k8s:
      definition:
        kind: ConfigMap
        apiVersion: v1
        metadata:
          name: '{{ meta.name }}-drupal-config'
          namespace: '{{ meta.namespace }}'
          labels:
            app: drupal
            release: '{{ meta.name }}'
        data:
          settings.php: '{{ drupal_settings_php }}'

  - name: Files PVC
    k8s:
      definition:
        kind: PersistentVolumeClaim
        apiVersion: v1
        metadata:
          name: '{{ meta.name }}-files-pvc'
          namespace: '{{ meta.namespace }}'
          labels:
            app: drupal
            release: '{{ meta.name }}'
        spec:
          storageClassName: '{{ files_pvc | default("default") }}'
          accessModes:
            - '{{ files_accessmode | default("ReadWriteOnce")}}'
          resources:
            requests:
              storage: '{{ files_pvc_size  | default("1Gi") }}'

  - name: Mariadb PVC
    k8s:
      definition:
        kind: PersistentVolumeClaim
        apiVersion: v1
        metadata:
          name: '{{ meta.name }}-db-pvc'
          namespace: '{{ meta.namespace }}'
          labels:
            app: mariadb
            release: '{{ meta.name }}'
        spec:
          storageClassName: '{{ db_pvc | default("default") }}'
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: '{{ db_pvc_size  | default("1Gi") }}'

  - name: Drupal
    k8s:
      definition:
        kind: Deployment
        apiVersion: apps/v1
        metadata:
          name: '{{ meta.name }}-drupal'
          namespace: '{{ meta.namespace }}'
        spec:
          replicas: '{{ drupal_replicas }}'
          selector:
            matchLabels:
              app: drupal
          template:
            metadata:
              labels:
                app: drupal
                release: '{{ meta.name }}'
            spec:
              containers:
              - name: drupal
                image: '{{ drupal_image | default("drupal:8.7-apache")}}'
                ports:
                  - containerPort: 80
                livenessProbe:
                  tcpSocket:
                    port: 80
                  initialDelaySeconds: 60
                readinessProbe:
                  tcpSocket:
                    port: 80
                  initialDelaySeconds: 30
                volumeMounts:
                - mountPath: /var/www/html/sites/default/
                  name: drupal-settings
                - mountPath: /var/www/html/sites/default/files/
                  name: drupal-files
              imagePullSecrets:
                - name:  '{{ drupal_image_reg_secret }}'
              volumes:
              - name: drupal-settings
                configMap:
                  name: '{{ meta.name }}-drupal-config'
              - name: drupal-files
                persistentVolumeClaim:
                  claimName: '{{ meta.name }}-files-pvc'

  - name: Drupal secrets
    k8s:
      definition:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{ meta.name }}.drupal-secrets'
          namespace: '{{ meta.namespace }}'
          labels:
            app: drupal
            release: '{{ meta.name }}'
        type: Opaque
        data:
          db_database: '{{ drupal_db | b64encode }}'
          db_password: '{{ drupal_db_pass | b64encode }}'
          db_user: '{{ drupal_db_username | b64encode }}'
          password: '{{ drupal_password | b64encode }}'
          user: '{{ drupal_user | b64encode }}'

  - name: Mariadb secrets
    k8s:
      definition:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '{{ meta.name }}.mariadb-secrets'
          namespace: '{{ meta.namespace }}'
          labels:
            app: mariadb
            release: '{{ meta.name }}'
        type: Opaque
        data:
          root_password: '{{ mysql_root_password | b64encode }}'
  - name: Mariadb
    k8s:
      definition:
        kind: Deployment
        apiVersion: apps/v1
        metadata:
          name: '{{ meta.name }}-db'
          namespace: '{{ meta.namespace }}'
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: mariadb
          template:
            metadata:
              labels:
                app: mariadb
                release: '{{ meta.name }}'
            spec:
              containers:
              - name: mariadb
                image: "mariadb"
                ports:
                  - containerPort: 3306
                env:
                  - name: MYSQL_DATABASE
                    valueFrom:
                      secretKeyRef:
                        name: '{{ meta.name }}.drupal-secrets'
                        key: db_database
                  - name: MYSQL_USER
                    valueFrom:
                      secretKeyRef:
                        name: '{{ meta.name }}.drupal-secrets'
                        key: db_user
                  - name: MYSQL_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: '{{ meta.name }}.drupal-secrets'
                        key: db_password
                  - name: MYSQL_ROOT_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: '{{ meta.name }}.mariadb-secrets'
                        key: root_password
                volumeMounts:
                - mountPath: /var/lib/mysql/
                  name: drupal-db
              volumes:
                - name: drupal-db
                  persistentVolumeClaim:
                    claimName: '{{ meta.name }}-db-pvc'

  - name: Mariadb Service
    k8s:
      definition:
        kind: Service
        apiVersion: v1
        metadata:
          name: '{{ meta.name }}-db'
          namespace: '{{ meta.namespace }}'
          labels:
            app: mariadb
            release: '{{ meta.name }}'
        spec:
          type: NodePort
          ports:
            - port: 3306
              targetPort: 3306
          selector:
            app: 'mariadb'

  - name: Drupal Service
    k8s:
      definition:
        kind: Service
        apiVersion: v1
        metadata:
          name: '{{ meta.name }}-service'
          namespace: '{{ meta.namespace }}'
          labels:
            app: drupal
            release: '{{ meta.name }}'
        spec:
          type: NodePort
          ports:
            - port: 80
              targetPort: 80
          selector:
            app: 'drupal'