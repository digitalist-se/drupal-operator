---
- name: Drupal Settings
  k8s:
    state: present
    definition:
        kind: ConfigMap
        apiVersion: v1
        metadata:
          name: '{{ meta.name }}-drupal-config'
          namespace: '{{ meta.namespace }}'
          labels:
            app: drupal
            site: '{{ meta.name }}'
            drupal: '{{ meta.name }}'
        data:
          settings.php: '{{ drupal_settings_php }}'

- name: Drupal startup
  k8s:
    definition:
        kind: ConfigMap
        apiVersion: v1
        metadata:
          name: '{{ meta.name }}-drupal-startup'
          namespace: '{{ meta.namespace }}'
          labels:
            app: drupal
            site: '{{ meta.name }}'
            drupal: '{{ meta.name }}'
        data:
          startup.sh: '{{ drupal_startup }}'

- name: Files PVC
  k8s:
    definition:
      kind: PersistentVolumeClaim
      apiVersion: v1
      metadata:
        name: '{{ meta.name }}-files-pvc'
        namespace: '{{ meta.namespace }}'
        labels:
          app: drupal
          site: '{{ meta.name }}'
          drupal: '{{ meta.name }}'
      spec:
        storageClassName: '{{ files_pvc }}'
        accessModes:
          - '{{ files_accessmode }}'
        resources:
          requests:
            storage: '{{ files_pvc_size }}'

- name: Mariadb PVC
  when: no_db is not defined
  k8s:
    definition:
      kind: PersistentVolumeClaim
      apiVersion: v1
      metadata:
        name: '{{ meta.name }}-db-pvc'
        namespace: '{{ meta.namespace }}'
        labels:
          app: mariadb
          site: '{{ meta.name }}'
          db: '{{ meta.name }}'
      spec:
        storageClassName: '{{ db_pvc }}'
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: '{{ db_pvc_size }}'

- name: Drupal
  k8s:
    definition:
      kind: Deployment
      apiVersion: apps/v1
      metadata:
        name: '{{ meta.name }}-drupal'
        namespace: '{{ meta.namespace }}'
      spec:
        replicas: '{{ drupal_replicas }}'
        strategy:
          type: RollingUpdate
          rollingUpdate:
            maxSurge: 1
            maxUnavailable: 25%
        selector:
          matchLabels:
            drupal: '{{ meta.name }}'
        template:
          metadata:
            labels:
              drupal: '{{ meta.name }}'
              app: drupal
              site: '{{ meta.name }}'
            annotations:
              kubernetes.io/change-cause: '{{ change_cause }}'
          spec:
            initContainers:
            - name: init-db
              when: no_db is not defined
              image: busybox:1.28
              command: ['sh', '-c', "until nslookup '{{ meta.name }}-db'; do echo waiting for '{{ meta.name }}-db'; sleep 2; done;"]
            - name: init-drupal
              image: '{{ drupal_image }}'
              env:
                - name: DRUPAL_LOCALE
                  value: '{{ drupal_locale }}'
                - name: DRUPAL_LOCALE
                  value: '{{ drupal_locale }}'  
                - name: MYSQL_DATABASE
                  valueFrom:
                    secretKeyRef:
                      name: '{{ meta.name }}.drupal-secrets'
                      key: db_database
                - name: MYSQL_USER
                  valueFrom:
                    secretKeyRef:
                      name: '{{ meta.name }}.drupal-secrets'
                      key: db_user
                - name: MYSQL_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: '{{ meta.name }}.drupal-secrets'
                      key: db_password
                - name: DRUPAL_USER
                  valueFrom:
                    secretKeyRef:
                      name: '{{ meta.name }}.drupal-secrets'
                      key: user
                - name: DRUPAL_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: '{{ meta.name }}.drupal-secrets'
                      key: password  
              command: 
              - /bin/sh 
              - -c
              - while [ ! -f /scripts/settings.php ]; do echo waiting; sleep 2; done;
                cp /scripts/settings.php /pre-scripts/settings.php;
                cp /scripts/startup.sh /pre-scripts/startup.sh;
                chown -R www-data:www-data -R /pre-scripts;
                cp /pre-scripts/settings.php {{ drupal_web_root }}/sites/default/settings.php;
                cp /pre-scripts/startup.sh {{ drupal_root }}/startup.sh; 
                chmod 777 {{ drupal_root }}/startup.sh; 
                chown -R www-data:www-data {{ drupal_web_root }};
                {{ drupal_root }}/startup.sh
              volumeMounts:
              - mountPath: '/scripts/startup.sh'
                subPath: startup.sh
                name: drupal-startup
              - mountPath: '/scripts/settings.php'
                subPath: settings.php
                name: drupal-settings
              - name: pre-scripts
                mountPath: /pre-scripts
              - mountPath: '{{ drupal_web_root }}/sites/default/files/'
                name: drupal-files  
            containers:    
            - name: '{{ drupal_name }}'
              lifecycle:
                postStart:
                  exec:
                    command: 
                    - /bin/sh
                    - -c 
                    - while [ ! -f /pre-scripts/settings.php ]; do echo waiting; sleep 2; done && cp /pre-scripts/settings.php {{ drupal_web_root }}/sites/default/settings.php;
              imagePullPolicy: '{{ drupal_image_pull_policy }}'
              image: '{{ drupal_image }}'
              resources:
                requests:
                  memory: '{{ drupal_resources_requests_memory }}'
                  cpu: '{{ drupal_resources_requests_cpu }}'
                limits:
                  memory: '{{ drupal_resources_limits_memory }}'
                  cpu: '{{ drupal_resources_limits_cpu }}'
              ports:
                - containerPort: '{{ drupal_ports_containerPort }}'
              livenessProbe:
                tcpSocket:
                  port: '{{ drupal_livenessProbe_tcpSocket_port }}'
                initialDelaySeconds: '{{ drupal_livenessProbe_initialDelaySeconds }}'
                periodSeconds: '{{ drupal_livenessProbe_periodSeconds }}'
                timeoutSeconds: '{{ drupal_livenessProbe_timeoutSeconds }}'
              env:
                - name: DRUPAL_LOCALE
                  value: '{{ drupal_locale }}'
                - name: MYSQL_DATABASE
                  valueFrom:
                    secretKeyRef:
                      name: '{{ meta.name }}.drupal-secrets'
                      key: db_database
                - name: MYSQL_USER
                  valueFrom:
                    secretKeyRef:
                      name: '{{ meta.name }}.drupal-secrets'
                      key: db_user
                - name: MYSQL_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: '{{ meta.name }}.drupal-secrets'
                      key: db_password
                - name: DRUPAL_USER
                  valueFrom:
                    secretKeyRef:
                      name: '{{ meta.name }}.drupal-secrets'
                      key: user
                - name: DRUPAL_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: '{{ meta.name }}.drupal-secrets'
                      key: password                      
              volumeMounts:
              - mountPath: '{{ drupal_web_root }}/sites/default/files/'
                name: drupal-files
              - mountPath: /pre-scripts
                name: pre-scripts
            imagePullSecrets:
              - name:  '{{ drupal_image_reg_secret }}'
            volumes:
            - name: drupal-settings
              configMap:
                name: '{{ meta.name }}-drupal-config'
            - name: drupal-startup
              configMap:
                name: '{{ meta.name }}-drupal-startup'
            - name: pre-scripts
              emptyDir: {}
            - name: drupal-files
              persistentVolumeClaim:
                claimName: '{{ meta.name }}-files-pvc'

- name: Drupal secrets
  k8s:
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: '{{ meta.name }}.drupal-secrets'
        namespace: '{{ meta.namespace }}'
        labels:
          app: drupal
          site: '{{ meta.name }}'
          drupal: '{{ meta.name }}'
      type: Opaque
      data:
        db_database: '{{ drupal_db | b64encode }}'
        db_password: '{{ drupal_db_pass | b64encode }}'
        db_user: '{{ drupal_db_username | b64encode }}'
        password: '{{ drupal_password | b64encode }}'
        user: '{{ drupal_user | b64encode }}'

- name: Mariadb secrets
  when: no_db is not defined
  k8s:
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: '{{ meta.name }}.mariadb-secrets'
        namespace: '{{ meta.namespace }}'
        labels:
          app: mariadb
          site: '{{ meta.name }}'
          db: '{{ meta.name }}'
      type: Opaque
      data:
        root_password: '{{ mysql_root_password | b64encode }}'

- name: Mariadb
  when: no_db is not defined
  k8s:
    definition:
      kind: StatefulSet
      apiVersion: apps/v1
      metadata:
        name: '{{ meta.name }}-db'
        namespace: '{{ meta.namespace }}'
      spec:
        replicas: 1
        selector:
          matchLabels:
            db: '{{ meta.name }}'
        strategy:
          type: Recreate
        template:
          metadata:
            labels:
              app: mariadb
              site: '{{ meta.name }}'
              db: '{{ meta.name }}'
          spec:
            containers:
            - name: mariadb
              image: "mariadb:10"
              ports:
                - containerPort: 3306
              env:
                - name: MYSQL_DATABASE
                  valueFrom:
                    secretKeyRef:
                      name: '{{ meta.name }}.drupal-secrets'
                      key: db_database
                - name: MYSQL_USER
                  valueFrom:
                    secretKeyRef:
                      name: '{{ meta.name }}.drupal-secrets'
                      key: db_user
                - name: MYSQL_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: '{{ meta.name }}.drupal-secrets'
                      key: db_password
                - name: MYSQL_ROOT_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: '{{ meta.name }}.mariadb-secrets'
                      key: root_password
              volumeMounts:
              - mountPath: /var/lib/mysql/
                name: drupal-db
            volumes:
              - name: drupal-db
                persistentVolumeClaim:
                  claimName: '{{ meta.name }}-db-pvc'

- name: Mariadb Nodeport
  when: no_db is not defined
  k8s:
    definition:
      kind: Service
      apiVersion: v1
      metadata:
        name: '{{ meta.name }}-db'
        namespace: '{{ meta.namespace }}'
        labels:
          app: mariadb
          site: '{{ meta.name }}'
      spec:
        type: NodePort
        ports:
          - port: 3306
            targetPort: 3306
        selector:
          db: '{{ meta.name }}'

- name: Drupal Nodeport
  when: 
    - no_drupal_nodeport is not defined
  k8s:
    definition:
      kind: Service
      apiVersion: v1
      metadata:
        name: '{{ meta.name }}-np'
        namespace: '{{ meta.namespace }}'
        labels:
          app: drupal
          site: '{{ meta.name }}'
      spec:
        type: NodePort
        ports:
          - port: 80
            targetPort: 80
        selector:
          drupal: '{{ meta.name }}'

- name: Drupal Loadbalancer
  when: 
    - drupal_loadbalancer
  k8s:
    definition:
      kind: Service
      apiVersion: v1
      metadata:
        name: '{{ meta.name }}-lb'
        namespace: '{{ meta.namespace }}'
        labels:
          app: drupal
          site: '{{ meta.name }}'
      spec:
        type: LoadBalancer
        ports:
          - port: 80
            targetPort: 80
        selector:
          drupal: '{{ meta.name }}'

