- hosts: localhost
  gather_facts: no
  vars:
    - drupal_replicas: 1
    - drupal_db: 'drupal'
    - drupal_db_username: 'drupal'
    - drupal_db_pass: 'drupal'
    - drupal_db_prefix: ''
    - drupal_db_port: '3306'
    - drupal_db_driver: 'mysql'
    - drupal_db_namespace: 'Drupal\\Core\\Database\\Driver\\mysql'
    - drupal_translation_path: 'sites/default/files/translations'
    - drupal_extra_config: ''
    - drupal_settings_php: |-
            <?php
            $databases['default']['default'] = array(
              'database' => '{{ drupal_db }}',
              'username' => '{{ drupal_db_username }}',
              'password' => '{{ drupal_db_pass }}',
              'prefix' => '{{ drupal_db_prefix }}',
              'host' => '{{ meta.name }}-db',
              'port' => '{{ drupal_db_port }}',
              'namespace' => '{{ drupal_db_namespace }}',
              'driver' => '{{ drupal_db_driver }}',
            );
            $settings['hash_salt'] = '{{ hash_salt | default(lookup('password', '/dev/null chars=ascii_letters'), true) }}';
            $settings['trusted_host_patterns'] = ['{{ trusted_host_patterns | default('^.+$', true) }}'];
            $config['locale.settings']['translation']['path'] = '{{ drupal_translation_path }}';
            {{ drupal_extra_config }}

  tasks:
  - name: Drupal Settings
    k8s:
      definition:
        kind: ConfigMap
        apiVersion: v1
        metadata:
          name: '{{ meta.name }}-drupal-config'
          namespace: '{{ meta.namespace }}'
        data:
          settings.php: '{{ drupal_settings_php }}'


  - name: Files PVC
    k8s:
      definition:
        kind: PersistentVolumeClaim
        apiVersion: v1
        metadata:
          name: '{{ meta.name }}-files-pvc'
          namespace: '{{ meta.namespace }}'
        spec:
          storageClassName: '{{ files_pvc | default("default") }}'
          accessModes:
            - '{{ files_accessmode | default("ReadWriteOnce")}}'
          resources:
            requests:
              storage: '{{ files_pvc_size  | default("1Gi") }}'

  - name: Mariadb PVC
    k8s:
      definition:
        kind: PersistentVolumeClaim
        apiVersion: v1
        metadata:
          name: '{{ meta.name }}-db-pvc'
          namespace: '{{ meta.namespace }}'
        spec:
          storageClassName: '{{ db_pvc | default("default") }}'
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: '{{ db_pvc_size  | default("1Gi") }}'

  - name: Drupal
    k8s:
      definition:
        kind: Deployment
        apiVersion: apps/v1
        metadata:
          name: '{{ meta.name }}-drupal'
          namespace: '{{ meta.namespace }}'
        spec:
          replicas: '{{ drupal_replicas }}'
          selector:
            matchLabels:
              app: drupal
          template:
            metadata:
              labels:
                app: drupal
            spec:
              containers:
              - name: drupal
                image: '{{ drupal_image | default("drupal:8.7-apache")}}'
                ports:
                  - containerPort: 80
                livenessProbe:
                  tcpSocket:
                    port: 80
                  initialDelaySeconds: 60
                readinessProbe:
                  tcpSocket:
                    port: 80
                  initialDelaySeconds: 30
                volumeMounts:
                - mountPath: /var/www/html/sites/default/
                  name: drupal-settings
                - mountPath: /var/www/html/sites/default/files/
                  name: drupal-files
              volumes:
              - name: drupal-settings
                configMap:
                  name: '{{ meta.name }}-drupal-config'
              - name: drupal-files
                persistentVolumeClaim:
                  claimName: '{{ meta.name }}-files-pvc'

  - name: Mariadb
    k8s:
      definition:
        kind: Deployment
        apiVersion: apps/v1
        metadata:
          name: '{{ meta.name }}-db'
          namespace: '{{ meta.namespace }}'
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: mariadb
          template:
            metadata:
              labels:
                app: mariadb
            spec:
              containers:
              - name: mariadb
                image: "mariadb"
                ports:
                  - containerPort: 3306
                env:
                  - name: MYSQL_DATABASE
                    value: '{{ drupal_db }}'
                  - name: MYSQL_USER
                    value: '{{ drupal_db_username }}'
                  - name: MYSQL_PASSWORD
                    value: '{{ drupal_db_pass }}'
                  - name: MYSQL_RANDOM_ROOT_PASSWORD
                    value: "yes"
                volumeMounts:
                - mountPath: /var/lib/mysql/
                  name: drupal-db
              volumes:
                - name: drupal-db
                  persistentVolumeClaim:
                    claimName: '{{ meta.name }}-db-pvc'

  - name: Mariadb Service
    k8s:
      definition:
        kind: Service
        apiVersion: v1
        metadata:
          name: '{{ meta.name }}-db'
          namespace: '{{ meta.namespace }}'
        spec:
          type: NodePort
          ports:
            - port: 3306
              targetPort: 3306
          selector:
            app: 'mariadb'

  - name: Drupal Service
    k8s:
      definition:
        kind: Service
        apiVersion: v1
        metadata:
          name: '{{ meta.name }}-service'
          namespace: '{{ meta.namespace }}'
        spec:
          type: NodePort
          ports:
            - port: 80
              targetPort: 80
          selector:
            app: 'drupal'